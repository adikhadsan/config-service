spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/configdb
spring.datasource.username=admin
spring.datasource.password=admin

# Tell Hibernate explicitly which dialect to use
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Don't auto-create or update tables — manage schema manually
spring.jpa.hibernate.ddl-auto=none

# Show SQL queries in logs (optional, for debugging)
spring.jpa.show-sql=true
