# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  labels:
    app: config-service
spec:
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      dnsPolicy: ClusterFirst
      containers:
        - name: config-service

          envFrom:
            - configMapRef:
                name: config-service-cm
            - secretRef:
                name: config-service-secret
          image: 8485012281/config-service:1.0.2
          ports:
            - containerPort: 8080
              name: app-port            
          livenessProbe:
            httpGet:
              path: /ping
              port: app-port
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /ping
              port: app-port
            failureThreshold: 3
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /ping
              port: app-port
            failureThreshold: 9
            periodSeconds: 10
            timeoutSeconds: 3              
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
spec:
  type: NodePort
  selector:
    app: config-service
  ports:
    - protocol: TCP
      port: 8080         
      targetPort: 8080   
